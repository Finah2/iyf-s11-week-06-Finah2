<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Directory</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&family=Open+Sans&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Open Sans', sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 2rem; }

        .wrapper { max-width: 1000px; margin: 0 auto; }

        h1 { font-family: 'Poppins', sans-serif; color: #39ff14; font-size: 2rem; margin-bottom: 0.25rem; }
        .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 2rem; }

        .controls {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        input, select {
            padding: 0.75rem 1rem;
            background: #16213e;
            border: 2px solid #333;
            border-radius: 6px;
            color: #fff;
            font-size: 0.9rem;
            font-family: 'Open Sans', sans-serif;
            transition: border-color 0.3s;
        }

        input { flex: 1; min-width: 200px; }
        input::placeholder { color: #444; }
        input:focus, select:focus { outline: none; border-color: #39ff14; }
        select option { background: #16213e; }

        #loading {
            text-align: center;
            padding: 3rem;
            color: #555;
            font-size: 1rem;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #39ff14;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 1rem;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        #error {
            background: rgba(231,76,60,0.1);
            border: 1px solid #e74c3c;
            color: #e74c3c;
            padding: 1rem;
            border-radius: 6px;
            margin-bottom: 1rem;
        }

        .hidden { display: none; }

        #users-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 1.5rem;
        }

        .user-card {
            background: #16213e;
            border-radius: 8px;
            padding: 1.5rem;
            border: 1px solid #222;
            border-top: 3px solid #39ff14;
            transition: transform 0.3s, border-color 0.3s;
            animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user-card:hover { transform: translateY(-4px); border-color: #39ff14; }

        .user-card h2 { font-family: 'Poppins', sans-serif; font-size: 1.1rem; color: #fff; margin-bottom: 0.75rem; }
        .user-card p { font-size: 0.85rem; color: #aaa; margin-bottom: 0.3rem; line-height: 1.6; }

        .no-results { text-align: center; color: #444; padding: 3rem; grid-column: 1/-1; }
        .count { color: #555; font-size: 0.85rem; margin-bottom: 1rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>User Directory</h1>
    <p class="subtitle">Task 12.2 — Fetching and displaying API data</p>

    <div class="controls">
        <input type="text" id="search" placeholder="🔍 Search by name or email...">
        <select id="sort">
            <option value="default">Sort: Default</option>
            <option value="az">Name: A → Z</option>
            <option value="za">Name: Z → A</option>
        </select>
        <select id="city-filter">
            <option value="">Filter by city</option>
        </select>
    </div>

    <p class="count" id="count"></p>

    <div id="loading">
        <div class="spinner"></div>
        Loading users...
    </div>

    <div id="error" class="hidden"></div>
    <div id="users-container"></div>
</div>

<script>
    let allUsers = [];
    const loading = document.getElementById("loading");
    const errorDiv = document.getElementById("error");
    const container = document.getElementById("users-container");
    const searchInput = document.getElementById("search");
    const sortSelect = document.getElementById("sort");
    const cityFilter = document.getElementById("city-filter");
    const countEl = document.getElementById("count");

    async function loadUsers() {
        try {
            const response = await fetch("https://jsonplaceholder.typicode.com/users");

            if (!response.ok) throw new Error("Failed to fetch users");

            allUsers = await response.json();

            // Populate city filter
            const cities = [...new Set(allUsers.map(u => u.address.city))].sort();
            cities.forEach(city => {
                const option = document.createElement("option");
                option.value = city;
                option.textContent = city;
                cityFilter.appendChild(option);
            });

            displayUsers(allUsers);

        } catch (error) {
            errorDiv.textContent = `Error: ${error.message}`;
            errorDiv.classList.remove("hidden");
        } finally {
            loading.classList.add("hidden");
        }
    }

    function displayUsers(users) {
        container.innerHTML = "";
        countEl.textContent = `Showing ${users.length} user${users.length !== 1 ? "s" : ""}`;

        if (users.length === 0) {
            container.innerHTML = '<p class="no-results">No users match your search.</p>';
            return;
        }

        users.forEach(user => {
            const card = document.createElement("div");
            card.className = "user-card";
            card.innerHTML = `
                <h2>${user.name}</h2>
                <p>📧 ${user.email}</p>
                <p>🏢 ${user.company.name}</p>
                <p>📍 ${user.address.city}</p>
                <p>🌐 ${user.website}</p>
                <p>📞 ${user.phone}</p>
            `;
            container.appendChild(card);
        });
    }

    function filterAndSort() {
        const query = searchInput.value.toLowerCase();
        const sort = sortSelect.value;
        const city = cityFilter.value;

        let filtered = allUsers.filter(user => {
            const matchesSearch = user.name.toLowerCase().includes(query) ||
                                  user.email.toLowerCase().includes(query);
            const matchesCity = city === "" || user.address.city === city;
            return matchesSearch && matchesCity;
        });

        if (sort === "az") filtered.sort((a, b) => a.name.localeCompare(b.name));
        if (sort === "za") filtered.sort((a, b) => b.name.localeCompare(a.name));

        displayUsers(filtered);
    }

    searchInput.addEventListener("input", filterAndSort);
    sortSelect.addEventListener("change", filterAndSort);
    cityFilter.addEventListener("change", filterAndSort);

    loadUsers();
</script>

</body>
</html>
