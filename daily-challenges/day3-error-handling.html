<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Day 3 — Error Handling</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Georgia, sans-serif; background: #1a1a2e; color: #fff; min-height: 100vh; padding: 2rem; }
        .wrapper { max-width: 600px; margin: 0 auto; }
        h1 { color: #39ff14; font-size: 2rem; margin-bottom: 0.25rem; }
        .subtitle { color: #555; font-size: 0.85rem; margin-bottom: 0.5rem; }
        p.desc { color: #aaa; margin-bottom: 2rem; line-height: 1.7; }
        .controls { display: flex; gap: 0.75rem; margin-bottom: 2rem; flex-wrap: wrap; }
        input { flex: 1; padding: 0.75rem 1rem; background: #16213e; border: 2px solid #333; border-radius: 6px; color: #fff; font-size: 0.95rem; min-width: 100px; }
        input:focus { outline: none; border-color: #39ff14; }
        button { padding: 0.75rem 1.5rem; background: #39ff14; color: #1a1a2e; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: all 0.3s; }
        button:hover { background: #28b30e; }
        .quick-btns { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.5rem; }
        .quick-btn { padding: 0.4rem 1rem; background: transparent; border: 1px solid #333; border-radius: 20px; color: #aaa; cursor: pointer; font-size: 0.8rem; transition: all 0.3s; }
        .quick-btn:hover { border-color: #39ff14; color: #39ff14; }
        #result { background: #16213e; border-radius: 8px; padding: 1.5rem; min-height: 120px; }
        .user-card { border-left: 4px solid #39ff14; padding-left: 1rem; }
        .user-card.default { border-color: #f39c12; }
        .user-card h3 { font-size: 1.1rem; margin-bottom: 0.5rem; }
        .user-card p { color: #aaa; font-size: 0.9rem; margin-bottom: 0.3rem; }
        .badge { display: inline-block; font-size: 0.75rem; padding: 0.2rem 0.6rem; border-radius: 10px; margin-bottom: 0.75rem; }
        .badge.real { background: rgba(57,255,20,0.15); color: #39ff14; }
        .badge.default { background: rgba(243,156,18,0.15); color: #f39c12; }
        .loading-text { color: #555; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>Error Handling</h1>
    <p class="subtitle">Day 3 — Week 6</p>
    <p class="desc">Fetch a user by ID. If the user doesn't exist (404), instead of crashing, we return a friendly default user. IDs 1–10 are real. Anything else triggers the fallback.</p>

    <div class="controls">
        <input type="number" id="user-id" placeholder="Enter user ID (1-10)" min="1">
        <button onclick="fetchUser()">Fetch User</button>
    </div>

    <div class="quick-btns">
        <span style="color:#555; font-size:0.8rem; align-self:center;">Try:</span>
        <button class="quick-btn" onclick="fetchById(1)">ID: 1 ✅</button>
        <button class="quick-btn" onclick="fetchById(5)">ID: 5 ✅</button>
        <button class="quick-btn" onclick="fetchById(99)">ID: 99 ❌</button>
        <button class="quick-btn" onclick="fetchById(0)">ID: 0 ❌</button>
    </div>

    <div id="result">
        <p class="loading-text">Enter a user ID above to get started.</p>
    </div>
</div>

<script>
    const DEFAULT_USER = {
        name: "Guest User",
        email: "guest@example.com",
        phone: "N/A",
        company: { name: "Unknown" },
        address: { city: "Unknown" },
        isDefault: true
    };

    async function getUser(id) {
        try {
            const response = await fetch(`https://jsonplaceholder.typicode.com/users/${id}`);

            if (!response.ok) {
                if (response.status === 404) {
                    console.log(`User ${id} not found — returning default user`);
                    return DEFAULT_USER;
                }
                throw new Error(`Server error: ${response.status}`);
            }

            return await response.json();

        } catch (error) {
            console.error("Fetch failed:", error.message);
            return DEFAULT_USER;
        }
    }

    async function fetchById(id) {
        document.getElementById("user-id").value = id;
        document.getElementById("result").innerHTML = '<p class="loading-text">⏳ Fetching...</p>';

        const user = await getUser(id);
        displayUser(user, id);
    }

    async function fetchUser() {
        const id = document.getElementById("user-id").value;
        if (!id) return;
        await fetchById(parseInt(id));
    }

    function displayUser(user, requestedId) {
        const isDefault = user.isDefault;
        const result = document.getElementById("result");

        result.innerHTML = `
            <div class="user-card ${isDefault ? "default" : ""}">
                <span class="badge ${isDefault ? "default" : "real"}">
                    ${isDefault ? "⚠️ Default User (ID ${requestedId} not found)" : "✅ Real User"}
                </span>
                <h3>${user.name}</h3>
                <p>📧 ${user.email}</p>
                <p>📞 ${user.phone}</p>
                <p>🏢 ${user.company.name}</p>
                <p>📍 ${user.address.city}</p>
            </div>
        `;
    }
</script>

</body>
</html>
